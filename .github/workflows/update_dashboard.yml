name: Update Market Dashboard

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '*/30 * * * *'  # Rulează la fiecare 30 de minute (mod: portfolio)
    - cron: '0 6 * * *'     # Rulează zilnic la 06:00 UTC (ora 09:00 RO în timpul verii) (mod: all)
  workflow_dispatch:      # Permite rularea manuală din buton

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permite roboțelului să salveze fișierele generate

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas requests yfinance ib_insync beautifulsoup4 lxml pycryptodome -r requirements.txt

    - name: Run Market Scanner
      env:
        TZ: 'Europe/Bucharest'
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # Optional/Deprecated
        IBKR_TOKEN: ${{ secrets.IBKR_TOKEN }}
        IBKR_QUERY_ID: ${{ secrets.IBKR_QUERY_ID }}
        PORTFOLIO_PASSWORD: ${{ secrets.PORTFOLIO_PASSWORD }}
      run: |
        MODE="portfolio"
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
          MODE="all"
        fi
        echo "Running market scanner in mode: $MODE"
        python update_sp500_json.py
        python market_scanner.py --mode $MODE

    - name: Commit and Push changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add index.html dashboard_state.json portfolio.csv watchlist.csv sp500_tickers.json
        git commit -m "Auto-update Dashboard [skip ci]" || echo "No changes to commit"
        git push origin HEAD:main || (git fetch origin main && git rebase -X theirs origin/main && git push origin HEAD:main)
